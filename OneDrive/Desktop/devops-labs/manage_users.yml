---
- name: Manage Users Playbook
  hosts: all
  become: yes
  tasks:
    - name: Create devops_team group
      ansible.builtin.group:
        name: devops_team
        state: present

    - name: Create app_admin user
      ansible.builtin.user:
        name: app_admin
        group: devops_team
        shell: /bin/bash
        create_home: yes
        state: present
